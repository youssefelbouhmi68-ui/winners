<section class="dashboard">

    <h1>Documents importants</h1>

    
    <form class="form-document">
        <label>Nom du document</label>
        <input type="text" placeholder="Nom du document" required>

        <label>Fichier</label>
        <input type="file" required>

        <button type="submit">Ajouter le document</button>
    </form>

    
    <h2>Documents existants</h2>

    <table>
        <tr>
            <th>Nom</th>
            <th>Type</th>
            <th>Date</th>
            <th>Actions</th>
        </tr>
        <tr>
            <td>Contrat Client X</td>
            <td>PDF</td>
            <td>01/04/2026</td>
            <td><a href="#">Télécharger</a></td>
        </tr>
        <tr>
            <td>Rapport Mensuel</td>
            <td>DOCX</td>
            <td>28/03/2026</td>
            <td><a href="#">Télécharger</a></td>
        </tr>
    </table>

</section>
